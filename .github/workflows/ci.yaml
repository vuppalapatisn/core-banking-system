name: CI — Build, Test & Publish

on:
  push:
    branches: [main]
    paths:
      - "microservices/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "microservices/**"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # -------------------------------------------------------------------------
  # Discover every buildable service under microservices/*/pom.xml so new
  # services are picked up automatically — no edits to this workflow needed.
  # -------------------------------------------------------------------------
  discover:
    name: Discover services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          services=$(find microservices -maxdepth 2 -name pom.xml -printf '%h\n' \
            | sed 's|microservices/||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix={\"service\":$services}" >> "$GITHUB_OUTPUT"
          echo "Discovered services: $services"

  # -------------------------------------------------------------------------
  # Build + test each service (Maven runs the JUnit suite), then verify the
  # Docker image builds. No registry secrets required (build only, no push).
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Maven build & test — ${{ matrix.service }}
        working-directory: microservices/${{ matrix.service }}
        run: mvn clean package --no-transfer-progress
      - name: Build Docker image — ${{ matrix.service }}
        working-directory: microservices/${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:ci .
      - name: Upload JAR artifact — ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: microservices/${{ matrix.service }}/target/*.jar
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------------------
  # Are Docker Hub credentials configured? Gates the publish job so forks /
  # secret-less repos still get a green pipeline (build+test only).
  # -------------------------------------------------------------------------
  check-secrets:
    name: Check registry secrets
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.c.outputs.enabled }}
    steps:
      - id: c
        run: |
          if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DOCKER_USERNAME / DOCKER_PASSWORD not set — skipping image publish."
          fi

  # -------------------------------------------------------------------------
  # Publish multi-arch images to Docker Hub on pushes to main (after tests).
  # Tags: latest, sha-<sha>, and the run number. Skipped when secrets absent.
  # -------------------------------------------------------------------------
  publish:
    name: Publish ${{ matrix.service }}
    needs: [discover, build, check-secrets]
    if: github.event_name != 'pull_request' && needs.check-secrets.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Maven package — ${{ matrix.service }}
        working-directory: microservices/${{ matrix.service }}
        run: mvn clean package -DskipTests --no-transfer-progress
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker metadata — ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ github.run_number }}
      - name: Build & push (multi-arch) — ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: microservices/${{ matrix.service }}
          file: microservices/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
