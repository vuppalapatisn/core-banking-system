spring.application.name=orchestration-service
server.servlet.context-path=/orchestration
server.port=8096
spring.jmx.enabled=false

# ---------------------------------------------------------------------------
# Orchestration & Integration Layer configuration.
# The business rules below are EXTERNALIZED here so credit policy can change
# without a code deploy (Business Rules Engine). Ordered by priority.
# ---------------------------------------------------------------------------

# Credit-policy rule set (evaluated by the RulesEngine / DecisionOrchestrator).
orchestration.rules.credit[0].name=reject-low-credit-score
orchestration.rules.credit[0].attribute=creditScore
orchestration.rules.credit[0].operator=LT
orchestration.rules.credit[0].value=600
orchestration.rules.credit[0].outcome=REJECT
orchestration.rules.credit[0].message=Credit score below minimum threshold (600)

orchestration.rules.credit[1].name=review-high-amount
orchestration.rules.credit[1].attribute=amount
orchestration.rules.credit[1].operator=GT
orchestration.rules.credit[1].value=100000
orchestration.rules.credit[1].outcome=REVIEW
orchestration.rules.credit[1].message=Loan amount exceeds auto-approval limit (100000)

orchestration.rules.credit[2].name=approve-default
orchestration.rules.credit[2].attribute=creditScore
orchestration.rules.credit[2].operator=GTE
orchestration.rules.credit[2].value=600
orchestration.rules.credit[2].outcome=APPROVE
orchestration.rules.credit[2].message=Meets baseline credit policy

# Risk rule set (second model coordinated by the DecisionOrchestrator).
orchestration.rules.risk[0].name=reject-high-dti
orchestration.rules.risk[0].attribute=debtToIncome
orchestration.rules.risk[0].operator=GT
orchestration.rules.risk[0].value=0.45
orchestration.rules.risk[0].outcome=REJECT
orchestration.rules.risk[0].message=Debt-to-income ratio above 0.45

orchestration.rules.risk[1].name=review-thin-file
orchestration.rules.risk[1].attribute=creditHistoryYears
orchestration.rules.risk[1].operator=LT
orchestration.rules.risk[1].value=2
orchestration.rules.risk[1].outcome=REVIEW
orchestration.rules.risk[1].message=Thin credit file (<2 years)

# ESB / integration content-based routes: message type -> logical destination.
orchestration.integration.routes.loan.disbursement=payments-switch
orchestration.integration.routes.loan.rejection=notification-service
orchestration.integration.routes.kyc.request=aml-kyc-service

# Service-mesh-style resilience for outbound dispatch (also enforceable via Istio; see k8s).
orchestration.integration.resilience.max-retries=2
orchestration.integration.resilience.circuit-failure-threshold=5
orchestration.integration.resilience.circuit-open-millis=10000

# Actuator / metrics / health probes.
management.endpoints.enabled-by-default=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator
management.endpoints.access.default=unrestricted
management.endpoint.prometheus.enabled=true
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.minimum-expected-value.http.server.requests=5ms
management.metrics.distribution.maximum-expected-value.http.server.requests=10s

springdoc.swagger-ui.path=/swagger-ui.html
