spring.application.name=api-gateway
server.servlet.context-path=/api-gateway
server.port=8095
spring.jmx.enabled=false

# ---------------------------------------------------------------------------
# API Management & Security Layer configuration.
# Secrets (JWT signing key, tokenization key) MUST be supplied via environment
# variables / Kubernetes secrets in any shared environment. The defaults below
# are development-only placeholders and are never used for production deploys.
# ---------------------------------------------------------------------------

# OAuth2 / OIDC (JWT). Dev-only HS256 secret; override GATEWAY_SECURITY_JWT_SECRET in real envs.
gateway.security.jwt.secret=${GATEWAY_SECURITY_JWT_SECRET:dev-only-change-me-please-32bytes-minimum-secret}
gateway.security.jwt.issuer=api-gateway
gateway.security.jwt.ttl-seconds=3600

# Encryption & Tokenization. Dev-only AES key (base64, 32 bytes for AES-256).
gateway.tokenization.aes-key=${GATEWAY_TOKENIZATION_AES_KEY:ZGV2LW9ubHktYWVzLTI1Ni1rZXktMzItYnl0ZXMhISE=}

# Rate limiting (per client, sliding token bucket).
gateway.rate-limit.enabled=true
gateway.rate-limit.requests-per-minute=120
gateway.rate-limit.burst=40

# WAF request inspection.
gateway.waf.enabled=true

# Downstream routes for the APIM proxy: alias -> base URL (context path included).
gateway.routes.product=${GATEWAY_ROUTE_PRODUCT:http://product-service:8090/product-service}
gateway.routes.images=${GATEWAY_ROUTE_IMAGES:http://images-service:8090/image-service}
gateway.routes.ecommerce=${GATEWAY_ROUTE_ECOMMERCE:http://ecommerce-service:8090/ecommerce-service}

# Actuator / metrics / health probes.
management.endpoints.enabled-by-default=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator
management.endpoints.access.default=unrestricted
management.endpoint.prometheus.enabled=true
management.endpoint.prometheus.access=unrestricted
management.prometheus.metrics.export.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# HTTP latency histograms — enable P90/P95/P99 via histogram_quantile() in Prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.minimum-expected-value.http.server.requests=5ms
management.metrics.distribution.maximum-expected-value.http.server.requests=10s

# springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
