apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local overlay for Docker Desktop Kubernetes.
#   kubectl apply -k k8s/overlays/local
#
# Uses the base (all 8 services) but flips every deployment to imagePullPolicy: IfNotPresent so
# Kubernetes uses the images you built locally (docker.io/sudhavuppalapati/<service>:latest) instead
# of trying to pull them from Docker Hub.

resources:
  - ../..

patches:
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
