apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestration-service
  template:
    metadata:
      labels:
        app: orchestration-service
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: orchestration-service
          image: docker.io/sudhavuppalapati/orchestration-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8096
          envFrom:
            - configMapRef:
                name: orchestration-service-config
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:TieredStopAtLevel=1 -Xms128m -Xmx400m"
          startupProbe:
            httpGet:
              path: /orchestration/actuator/health
              port: 8096
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /orchestration/actuator/health
              port: 8096
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /orchestration/actuator/health
              port: 8096
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
