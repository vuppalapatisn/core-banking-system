# TEMPLATE ONLY — never commit real secret values.
#
# Create the real Secret out-of-band (kubectl / sealed-secrets / external secrets), e.g.:
#
#   kubectl create secret generic api-gateway-secret -n ecommerce \
#     --from-literal=GATEWAY_SECURITY_JWT_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=GATEWAY_TOKENIZATION_AES_KEY="$(openssl rand -base64 32)" \
#     --from-literal=GATEWAY_SECURITY_CLIENTS_ADMIN_SECRET="$(openssl rand -base64 24)" \
#     --from-literal=GATEWAY_SECURITY_CLIENTS_SERVICE_SECRET="$(openssl rand -base64 24)" \
#     --from-literal=GATEWAY_SECURITY_MFA_TOTP_SEED="<Base32 seed provisioned into an authenticator app>"
#
# Notes:
#   - JWT secret must be >= 32 bytes (HS256).
#   - AES key must Base64-decode to 16, 24, or 32 bytes (AES-128/192/256).
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: ecommerce
type: Opaque
stringData:
  GATEWAY_SECURITY_JWT_SECRET: "REPLACE_ME_min_32_bytes"
  GATEWAY_TOKENIZATION_AES_KEY: "REPLACE_ME_base64_16_24_or_32_bytes"
  GATEWAY_SECURITY_CLIENTS_ADMIN_SECRET: "REPLACE_ME"
  GATEWAY_SECURITY_CLIENTS_SERVICE_SECRET: "REPLACE_ME"
  GATEWAY_SECURITY_MFA_TOTP_SEED: "REPLACE_ME_base32_seed"
