apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ecommerce
data:
  SERVER_PORT: "8095"
  SERVER_SERVLET_CONTEXT_PATH: "/api-gateway"
  # Downstream routes (alias -> base URL incl. context path). Secrets are NOT here — see the Secret.
  GATEWAY_ROUTE_PRODUCT: "http://product-service:8090/product-service"
  GATEWAY_ROUTE_IMAGES: "http://images-service:8090/image-service"
  GATEWAY_ROUTE_ECOMMERCE: "http://ecommerce-service:8090/ecommerce-service"
  # Rate limiting + WAF
  GATEWAY_RATE_LIMIT_ENABLED: "true"
  GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  GATEWAY_RATE_LIMIT_BURST: "40"
  GATEWAY_WAF_ENABLED: "true"
  # CORS allow-list (comma-separated). Extend deliberately; never use "*" with credentials.
  GATEWAY_CORS_ALLOWED_ORIGINS: "http://localhost:8092,http://localhost:5173"
  # Actuator / metrics / health probes
  MANAGEMENT_ENDPOINTS_ENABLED_BY_DEFAULT: "true"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: "/actuator"
  MANAGEMENT_ENDPOINTS_ACCESS_DEFAULT: "unrestricted"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS: "unrestricted"
  MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
